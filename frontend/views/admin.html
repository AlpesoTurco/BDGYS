<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Administrativo - Boda</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#D4AF37',
            silver: '#C0C0C0',
            ink: '#1f2937',
            panel: '#f9fafb'
          },
          fontFamily: {
            wedding: ['Playfair Display', 'serif'],
            script: ['Great Vibes', 'cursive']
          },
          boxShadow: {
            card: '0 12px 30px rgba(0,0,0,0.08)'
          }
        }
      }
    }
  </script>
  <style>
    .admin-bg { background: linear-gradient(135deg, rgba(0,0,0,0.75), rgba(0,0,0,0.55)), url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=1400&q=80'); background-size: cover; background-position: center; }
    .modal { display: none; }
    .modal.show { display: flex; }
  </style>
</head>
<body class="bg-panel text-ink">
  <header class="admin-bg text-white py-6 px-6 shadow-lg">
    <div class="max-w-6xl mx-auto flex flex-col gap-4 sm:flex-row sm:justify-between sm:items-center">
      <h1 class="text-3xl sm:text-4xl font-script text-gold">Panel Administrativo</h1>
      <button onclick="logout()" class="w-full sm:w-auto bg-white/90 text-ink px-4 py-3 rounded-lg font-semibold hover:bg-gold hover:text-black transition shadow">
        Cerrar Sesión
      </button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-8 space-y-8">
    <!-- Controles -->
    <div class="bg-white shadow-card rounded-2xl p-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div class="flex items-center gap-3 flex-1">
        <input id="search" type="search" placeholder="Buscar por nombre, email o código" class="flex-1 px-4 py-2 rounded-lg border border-gray-200 focus:border-gold focus:ring-1 focus:ring-gold outline-none" oninput="renderGuests()" />
        <select id="filterStatus" class="px-3 py-2 rounded-lg border border-gray-200 focus:border-gold focus:ring-1 focus:ring-gold outline-none" onchange="renderGuests()">
          <option value="all">Todos</option>
          <option value="yes">Asisten</option>
          <option value="no">No asisten</option>
          <option value="pending">Pendiente</option>
        </select>
      </div>
      <div class="flex gap-2">
        <button onclick="loadGuests()" class="px-4 py-2 rounded-lg border border-gray-200 hover:border-gold transition">Actualizar</button>
      </div>
    </div>

    <!-- KPIs -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div class="bg-white rounded-2xl p-5 shadow-card text-center">
        <p class="text-sm text-gray-500">Invitados Totales</p>
        <p class="text-3xl font-bold text-gold" id="totalGuests">0</p>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-card text-center">
        <p class="text-sm text-gray-500">Confirmados (sí)</p>
        <p class="text-3xl font-bold text-gold" id="confirmedGuests">0</p>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-card text-center">
        <p class="text-sm text-gray-500">Personas Totales</p>
        <p class="text-3xl font-bold text-gold" id="totalAttendees">0</p>
      </div>
    </div>

    <!-- Tabla y crear -->
    <div class="grid grid-cols-1 lg:grid-cols-[1.2fr,0.8fr] gap-6">
      <section class="bg-white rounded-2xl shadow-card p-4 sm:p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold">Invitados</h2>
          <span class="text-sm text-gray-500" id="visibleCount"></span>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm" id="guestTable">
            <thead class="bg-gray-50 text-gray-600">
              <tr>
                <th class="text-left px-3 py-2">Nombre</th>
                <th class="text-left px-3 py-2">Email</th>
                <th class="text-left px-3 py-2">Código</th>
                <th class="text-left px-3 py-2">Asistencia</th>
                <th class="text-left px-3 py-2">Invitados</th>
                <th class="text-left px-3 py-2">Acciones</th>
              </tr>
            </thead>
            <tbody id="guestTbody" class="divide-y divide-gray-100">
              <tr><td colspan="6" class="text-center py-6 text-gray-500">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="bg-white rounded-2xl shadow-card p-6">
        <h2 class="text-xl font-semibold mb-4">Crear nuevo invitado</h2>
        <form onsubmit="handleCreateGuest(event)" class="space-y-3">
          <div>
            <label class="block text-sm text-gray-600 mb-1" for="name">Nombre</label>
            <input id="name" required class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:border-gold focus:ring-1 focus:ring-gold outline-none" />
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1" for="email">Correo</label>
            <input id="email" type="email" required class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:border-gold focus:ring-1 focus:ring-gold outline-none" />
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1" for="phone">Teléfono</label>
            <input id="phone" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:border-gold focus:ring-1 focus:ring-gold outline-none" />
          </div>
          <button type="submit" class="w-full bg-gold text-black font-semibold rounded-lg py-2.5 hover:bg-silver transition">Crear invitado</button>
        </form>
      </section>
    </div>
  </main>

  <!-- Modal Editar -->
  <div id="editModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50 px-4" onclick="closeEdit()">
    <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-semibold">Editar invitado</h3>
        <button onclick="closeEdit()" class="text-gray-500 hover:text-black">✕</button>
      </div>
      <form id="editForm" onsubmit="handleUpdateGuest(event)" class="space-y-3">
        <input type="hidden" id="editId" />
        <div>
          <label class="block text-sm text-gray-600 mb-1" for="editName">Nombre</label>
          <input id="editName" required class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:border-gold focus:ring-1 focus:ring-gold outline-none" />
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1" for="editEmail">Correo</label>
          <input id="editEmail" type="email" required class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:border-gold focus:ring-1 focus:ring-gold outline-none" />
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label class="block text-sm text-gray-600 mb-1" for="editPhone">Teléfono</label>
            <input id="editPhone" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:border-gold focus:ring-1 focus:ring-gold outline-none" />
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1" for="editAttendance">Asistencia</label>
            <select id="editAttendance" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:border-gold focus:ring-1 focus:ring-gold outline-none">
              <option value="pending">Pendiente</option>
              <option value="yes">Sí</option>
              <option value="no">No</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label class="block text-sm text-gray-600 mb-1" for="editGuests">Personas</label>
            <input id="editGuests" type="number" min="1" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:border-gold focus:ring-1 focus:ring-gold outline-none" />
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1" for="editDiet">Dieta</label>
            <input id="editDiet" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:border-gold focus:ring-1 focus:ring-gold outline-none" />
          </div>
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1" for="editSong">Canción</label>
          <input id="editSong" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:border-gold focus:ring-1 focus:ring-gold outline-none" />
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1" for="editMessage">Mensaje</label>
          <textarea id="editMessage" rows="2" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:border-gold focus:ring-1 focus:ring-gold outline-none"></textarea>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button" onclick="closeEdit()" class="px-4 py-2 rounded-lg border border-gray-200 hover:border-gold">Cancelar</button>
          <button type="submit" class="px-4 py-2 rounded-lg bg-gold text-black font-semibold hover:bg-silver">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal QR -->
  <div id="qrModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50 px-4" onclick="closeQR()">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 text-center shadow-2xl" onclick="event.stopPropagation()">
      <h3 class="text-xl font-semibold text-ink mb-4">Código QR</h3>
      <img id="qrImage" src="" alt="QR Code" class="mx-auto mb-4 rounded-lg shadow-lg">
      <button onclick="closeQR()" class="bg-gold text-black px-6 py-2 rounded-full font-semibold hover:bg-silver transition">Cerrar</button>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    let guests = [];

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/login';
    }

    async function handleCreateGuest(event) {
      event.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim() || null;
      try {
        await apiRequest('/guests', 'POST', { name, email, phone }, token);
        event.target.reset();
        await loadGuests();
        alert('Invitado creado');
      } catch (err) {
        alert(err.message || 'Error al crear invitado');
      }
    }

    function renderGuests() {
      const tbody = document.getElementById('guestTbody');
      const search = document.getElementById('search').value.toLowerCase();
      const status = document.getElementById('filterStatus').value;

      const filtered = guests.filter(g => {
        const matchText = `${g.name} ${g.email} ${g.invitation_code}`.toLowerCase().includes(search);
        const matchStatus = status === 'all' ? true : (g.attendance || 'pending') === status;
        return matchText && matchStatus;
      });

      document.getElementById('visibleCount').textContent = `${filtered.length} visibles`;

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-6 text-gray-500">Sin resultados</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(g => {
        const attendanceLabel = g.attendance === 'yes' ? 'Sí' : g.attendance === 'no' ? 'No' : 'Pendiente';
        return `
          <tr class="hover:bg-gray-50">
            <td class="px-3 py-2 font-medium">${g.name}</td>
            <td class="px-3 py-2 text-gray-600">${g.email || ''}</td>
            <td class="px-3 py-2 text-gray-600">${g.invitation_code || ''}</td>
            <td class="px-3 py-2">
              <span class="px-2 py-1 rounded-full text-xs font-semibold ${g.attendance==='yes'?'bg-green-100 text-green-700':g.attendance==='no'?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700'}">${attendanceLabel}</span>
            </td>
            <td class="px-3 py-2 text-gray-600">${g.guests_count || 1}</td>
            <td class="px-3 py-2 space-x-1 whitespace-nowrap">
              <button onclick="openEdit(${g.id})" class="text-blue-600 hover:underline">Editar</button>
              <button onclick="getLink('${g.invitation_code}')" class="text-gray-600 hover:underline">Link</button>
              <button onclick="getQR('${g.invitation_code}')" class="text-gray-600 hover:underline">QR</button>
              <button onclick="deleteGuest(${g.id})" class="text-red-600 hover:underline">Eliminar</button>
            </td>
          </tr>`;
      }).join('');
    }

    async function loadGuests() {
      try {
        guests = await apiRequest('/guests', 'GET', null, token);
        updateStats();
        renderGuests();
      } catch (err) {
        console.error(err);
        alert('No se pudieron cargar los invitados');
      }
    }

    function updateStats() {
      const confirmed = guests.filter(g => g.attendance === 'yes').length;
      const totalGuests = guests.length;
      const totalAttendees = guests.reduce((sum, g) => sum + (g.guests_count || 1), 0);
      document.getElementById('totalGuests').textContent = totalGuests;
      document.getElementById('confirmedGuests').textContent = confirmed;
      document.getElementById('totalAttendees').textContent = totalAttendees;
    }

    async function getLink(code) {
      try {
        const res = await apiRequest(`/guests/link/${code}`, 'GET', null, token);
        await navigator.clipboard.writeText(res.link);
        alert('Link copiado');
      } catch (err) {
        alert('Error al generar link');
      }
    }

    async function getQR(code) {
      try {
        const res = await apiRequest(`/guests/qr/${code}`, 'GET', null, token);
        document.getElementById('qrImage').src = res.qr;
        document.getElementById('qrModal').classList.add('show');
      } catch (err) {
        alert('Error al generar QR');
      }
    }

    function closeQR() {
      document.getElementById('qrModal').classList.remove('show');
    }

    function openEdit(id) {
      const g = guests.find(x => x.id === id);
      if (!g) return;
      document.getElementById('editId').value = g.id;
      document.getElementById('editName').value = g.name || '';
      document.getElementById('editEmail').value = g.email || '';
      document.getElementById('editPhone').value = g.phone || '';
      document.getElementById('editAttendance').value = g.attendance || 'pending';
      document.getElementById('editGuests').value = g.guests_count || 1;
      document.getElementById('editDiet').value = g.diet || '';
      document.getElementById('editSong').value = g.song || '';
      document.getElementById('editMessage').value = g.message || '';
      document.getElementById('editModal').classList.add('show');
    }

    function closeEdit() {
      document.getElementById('editModal').classList.remove('show');
    }

    async function handleUpdateGuest(event) {
      event.preventDefault();
      const id = document.getElementById('editId').value;
      const payload = {
        name: document.getElementById('editName').value.trim(),
        email: document.getElementById('editEmail').value.trim(),
        phone: document.getElementById('editPhone').value.trim(),
        attendance: document.getElementById('editAttendance').value,
        guests_count: Number(document.getElementById('editGuests').value) || 1,
        diet: document.getElementById('editDiet').value.trim(),
        song: document.getElementById('editSong').value.trim(),
        message: document.getElementById('editMessage').value.trim()
      };
      try {
        await apiRequest(`/guests/${id}`, 'PUT', payload, token);
        closeEdit();
        await loadGuests();
      } catch (err) {
        alert(err.message || 'Error al actualizar');
      }
    }

    async function deleteGuest(id) {
      if (!confirm('¿Eliminar invitado?')) return;
      try {
        await apiRequest(`/guests/${id}`, 'DELETE', null, token);
        await loadGuests();
      } catch (err) {
        alert(err.message || 'Error al eliminar');
      }
    }

    // init
    loadGuests();
  </script>
</body>
</html>
