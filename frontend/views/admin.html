<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Administrativo - Boda </title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#D4AF37',
            silver: '#C0C0C0',
            wedding: {
              50: '#f8f9fa',
              100: '#e9ecef',
              200: '#dee2e6',
              300: '#ced4da',
              400: '#adb5bd',
              500: '#6c757d',
              600: '#495057',
              700: '#343a40',
              800: '#212529',
              900: '#000000'
            }
          },
          fontFamily: {
            'wedding': ['Playfair Display', 'serif'],
            'script': ['Great Vibes', 'cursive']
          }
        }
      }
    };
  </script>
  <style>
    .admin-bg { background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=1200&h=800&fit=crop&crop=center'); background-size: cover; background-position: center; }
  </style>
</head>
<body class="bg-wedding-50 font-wedding">
  <header class="admin-bg text-white py-6 px-6 shadow-lg">
    <div class="max-w-6xl mx-auto flex flex-col gap-4 sm:flex-row sm:justify-between sm:items-center">
      <h1 class="text-3xl sm:text-4xl font-script text-gold">Panel Administrativo</h1>
      <button onclick="logout()" class="w-full sm:w-auto bg-silver text-black px-4 py-3 rounded-lg font-semibold hover:bg-gold transition shadow">
        Cerrar Sesión
      </button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-8 space-y-8">
    <!-- Estadísticas -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 sm:gap-6">
      <div class="bg-white rounded-2xl p-6 shadow-xl text-center">
        <div class="text-3xl sm:text-4xl font-bold text-gold" id="totalGuests">0</div>
        <div class="text-wedding-600 text-sm sm:text-base">Invitados Totales</div>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-xl text-center">
        <div class="text-3xl sm:text-4xl font-bold text-gold" id="confirmedGuests">0</div>
        <div class="text-wedding-600 text-sm sm:text-base">Confirmados</div>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-xl text-center">
        <div class="text-3xl sm:text-4xl font-bold text-gold" id="totalAttendees">0</div>
        <div class="text-wedding-600 text-sm sm:text-base">Personas Totales</div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8">
      <!-- Crear Invitado -->
      <div class="bg-white rounded-2xl p-6 sm:p-8 shadow-xl">
        <h2 class="text-2xl sm:text-3xl font-script text-gold mb-6"> Crear Nuevo Invitado</h2>
        <form onsubmit="handleCreateGuest(event)" class="space-y-4">
          <div>
            <label for="name" class="block text-sm font-semibold text-wedding-700 mb-2">Nombre Completo</label>
            <input type="text" id="name" placeholder="Ej: Juan Pérez" required class="w-full px-4 py-3 rounded-lg border-2 border-wedding-300 focus:border-gold focus:outline-none transition text-wedding-700">
          </div>
          <div>
            <label for="email" class="block text-sm font-semibold text-wedding-700 mb-2">Correo Electrónico</label>
            <input type="email" id="email" placeholder="Ej: juan@example.com" required class="w-full px-4 py-3 rounded-lg border-2 border-wedding-300 focus:border-gold focus:outline-none transition text-wedding-700">
          </div>
          <div>
            <label for="phone" class="block text-sm font-semibold text-wedding-700 mb-2">Teléfono (Opcional)</label>
            <input type="tel" id="phone" placeholder="Ej: +34 123 456 789" class="w-full px-4 py-3 rounded-lg border-2 border-wedding-300 focus:border-gold focus:outline-none transition text-wedding-700">
          </div>
          <button type="submit" class="w-full bg-gold text-black py-3 rounded-lg font-semibold hover:bg-silver transition shadow-md active:scale-[0.99]">
            Crear Invitado
          </button>
        </form>
      </div>

      <!-- Lista de Invitados -->
      <div class="bg-white rounded-2xl p-6 sm:p-8 shadow-xl">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
          <h2 class="text-2xl sm:text-3xl font-script text-gold"> Invitados Registrados</h2>
          <p class="text-sm text-wedding-500 sm:hidden">Desliza para ver la lista completa</p>
        </div>
        <div class="max-h-[28rem] overflow-y-auto space-y-4 pr-1" id="guestList">
          <p class="text-wedding-500 text-center py-8">Cargando invitados...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal para QR -->
  <div id="qrModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 px-4" onclick="closeModal()">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 text-center shadow-2xl" onclick="event.stopPropagation()">
      <h3 class="text-xl font-semibold text-wedding-700 mb-4">Código QR</h3>
      <img id="qrImage" src="" alt="QR Code" class="mx-auto mb-4 rounded-lg shadow-lg">
      <button onclick="closeModal()" class="bg-gold text-black px-6 py-2 rounded-full font-semibold hover:bg-silver transition">Cerrar</button>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "login.html";

    async function handleCreateGuest(event) {
      event.preventDefault();
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const phone = document.getElementById("phone").value || null;

      try {
        const res = await apiRequest("/guests", "POST", { name, email, phone }, token);
        alert(` Invitado creado!\nCódigo: ${res.code}`);
        event.target.reset();
        loadGuests();
      } catch (error) {
        alert(" Error al crear invitado");
      }
    }

    async function loadGuests() {
      try {
        const guests = await apiRequest("/guests", "GET", null, token);
        const list = document.getElementById("guestList");

        if (guests.length === 0) {
          list.innerHTML = '<p class="text-wedding-500 text-center py-8">No hay invitados aún</p>';
          return;
        }

        list.innerHTML = guests.map(g => `
          <div class="bg-wedding-50 rounded-lg p-4 border border-wedding-200 shadow-sm">
            <div class="flex flex-col gap-3 sm:flex-row sm:justify-between sm:items-start">
              <div>
                <h4 class="font-semibold text-wedding-700 text-lg">${g.name}</h4>
                <p class="text-sm text-wedding-600 break-all"> ${g.email}</p>
                <p class="text-sm text-wedding-600"> Código: <strong>${g.invitation_code}</strong></p>
                <p class="text-sm text-wedding-600">Asistencia: ${g.attendance === 'yes' ? ' Sí' : g.attendance === 'no' ? ' No' : ' Pendiente'}</p>
              </div>
              <div class="flex flex-wrap gap-2">
                <button onclick="getLink('${g.invitation_code}')" class="flex-1 sm:flex-none min-w-[120px] bg-silver text-black px-3 py-2 rounded text-sm font-semibold hover:bg-gold transition shadow-sm">
                  Copiar Link
                </button>
                <button onclick="getQR('${g.invitation_code}')" class="flex-1 sm:flex-none min-w-[120px] bg-silver text-black px-3 py-2 rounded text-sm font-semibold hover:bg-gold transition shadow-sm">
                  Ver QR
                </button>
              </div>
            </div>
          </div>
        `).join('');

        const confirmed = guests.filter(g => g.attendance === 'yes').length;
        const total = guests.reduce((sum, g) => sum + (g.guests_count || 1), 0);

        document.getElementById("totalGuests").textContent = guests.length;
        document.getElementById("confirmedGuests").textContent = confirmed;
        document.getElementById("totalAttendees").textContent = total;
      } catch (error) {
        console.error("Error al cargar invitados:", error);
      }
    }

    async function getLink(code) {
      try {
        const res = await apiRequest(`/guests/link/${code}`, "GET", null, token);
        navigator.clipboard.writeText(res.link).then(() => alert("Link copiado al portapapeles"));
      } catch (error) {
        alert("Error al generar link");
      }
    }

    async function getQR(code) {
      try {
        const res = await apiRequest(`/guests/qr/${code}`, "GET", null, token);
        document.getElementById("qrImage").src = res.qr;
        document.getElementById("qrModal").classList.remove("hidden");
      } catch (error) {
        alert("Error al generar QR");
      }
    }

    function closeModal() {
      document.getElementById("qrModal").classList.add("hidden");
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }

    loadGuests();
  </script>
</body>
</html>
