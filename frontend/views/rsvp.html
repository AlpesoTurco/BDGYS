<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmar Asistencia - Boda</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#D4AF37',
            silver: '#C0C0C0',
            wedding: {
              50: '#f8f9fa',
              100: '#e9ecef',
              200: '#dee2e6',
              300: '#ced4da',
              400: '#adb5bd',
              500: '#6c757d',
              600: '#495057',
              700: '#343a40',
              800: '#212529',
              900: '#000000'
            }
          },
          fontFamily: {
            'wedding': ['Playfair Display', 'serif'],
            'script': ['Great Vibes', 'cursive']
          }
        }
      }
    };
  </script>
  <style>
    .rsvp-bg { background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1519741497674-611481863552?w=1200&h=800&fit=crop&crop=center'); background-size: cover; background-position: center; }
  </style>
</head>
<body class="bg-wedding-50 font-wedding">
  <!-- Código Screen -->
  <div id="codeScreen" class="rsvp-bg min-h-screen flex items-center justify-center px-6" style="display:none;">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center space-y-4">
      <h2 class="text-3xl font-script text-gold">Ingresa tu código</h2>
      <p class="text-wedding-600">Escribe el código de invitación para continuar.</p>
      <input id="codeInput" type="text" placeholder="Ej. ABC123" class="w-full px-4 py-3 rounded-lg border-2 border-wedding-300 focus:border-gold focus:outline-none" />
      <button onclick="submitCode()" class="w-full bg-gold text-black py-3 rounded-lg font-semibold hover:bg-silver transition">Continuar</button>
      <button onclick="window.location.href='/'" class="w-full bg-white border border-wedding-200 text-wedding-700 py-3 rounded-lg font-semibold hover:border-gold transition">Volver al inicio</button>
    </div>
  </div>

  <!-- Error Screen -->
  <div id="errorScreen" class="rsvp-bg min-h-screen flex items-center justify-center px-6" style="display:none;">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
      <h2 class="text-2xl font-script text-gold mb-4">Código no válido</h2>
      <p class="text-wedding-600 mb-6">El código de invitación que ingresaste no existe o ha expirado.</p>
      <button onclick="showCodeScreen()" class="bg-gold text-black px-6 py-3 rounded-full font-semibold hover:bg-silver transition">Ingresar otro código</button>
    </div>
  </div>

  <!-- Form Screen -->
  <div id="formScreen" class="rsvp-bg min-h-screen flex items-center justify-center px-6" style="display: none;">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-lg w-full">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-script text-gold mb-2">Álvaro & María</h1>
        <p class="text-wedding-600">Confirma tu Asistencia</p>
        <div id="welcome" class="text-lg font-semibold text-wedding-700 mt-4"></div>
      </div>

      <form id="rsvpForm" class="space-y-6">
        <div>
          <label class="block text-sm font-semibold text-wedding-700 mb-2">¿Asistirás?</label>
          <select name="attendance" required class="w-full px-4 py-3 rounded-lg border-2 border-wedding-300 focus:border-gold focus:outline-none transition">
            <option value="">-- Selecciona una opción --</option>
            <option value="yes">Sí, asistiré</option>
            <option value="no">No podré asistir</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-wedding-700 mb-2">¿Cuántas personas vienen? (incluyéndote)</label>
          <input type="number" name="guests_count" min="1" required class="w-full px-4 py-3 rounded-lg border-2 border-wedding-300 focus:border-gold focus:outline-none transition">
        </div>

        <div>
          <label class="block text-sm font-semibold text-wedding-700 mb-2">Preferencia de dieta</label>
          <input type="text" name="diet" placeholder="Ej: Vegetariana, Sin gluten" class="w-full px-4 py-3 rounded-lg border-2 border-wedding-300 focus:border-gold focus:outline-none transition">
        </div>

        <div>
          <label class="block text-sm font-semibold text-wedding-700 mb-2">Canción especial</label>
          <input type="text" name="song" placeholder="Tu canción favorita" class="w-full px-4 py-3 rounded-lg border-2 border-wedding-300 focus:border-gold focus:outline-none transition">
        </div>

        <div>
          <label class="block text-sm font-semibold text-wedding-700 mb-2">Mensaje para los novios</label>
          <textarea name="message" placeholder="Déjanos un mensaje..." rows="4" class="w-full px-4 py-3 rounded-lg border-2 border-wedding-300 focus:border-gold focus:outline-none transition resize-none"></textarea>
        </div>

        <button type="submit" class="w-full bg-gold text-black py-3 rounded-lg font-semibold hover:bg-silver transition duration-300">Confirmar Asistencia</button>
      </form>

      <div class="mt-6 text-center">
        <a href="/" class="text-wedding-600 hover:text-gold transition">Volver al inicio</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/rsvp.js"></script>
</body>
</html>
