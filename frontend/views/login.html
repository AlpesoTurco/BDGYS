<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Boda </title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#D4AF37',
            silver: '#C0C0C0',
            wedding: {
              50: '#f8f9fa',
              100: '#e9ecef',
              200: '#dee2e6',
              300: '#ced4da',
              400: '#adb5bd',
              500: '#6c757d',
              600: '#495057',
              700: '#343a40',
              800: '#212529',
              900: '#000000'
            }
          },
          fontFamily: {
            'wedding': ['Playfair Display', 'serif'],
            'script': ['Great Vibes', 'cursive']
          }
        }
      }
    };
  </script>
  <style>
    .login-bg { background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=1200&h=800&fit=crop&crop=center'); background-size: cover; background-position: center; }
  </style>
</head>
<body class="bg-wedding-50 font-wedding">
  <div class="login-bg min-h-screen flex items-center justify-center px-6">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-script text-gold mb-2">Álvaro & María</h1>
        <p class="text-wedding-600">Panel Administrativo</p>
      </div>
      
      <form onsubmit="login(event)" class="space-y-6">
        <div>
          <label for="username" class="block text-sm font-semibold text-wedding-700 mb-2">Usuario</label>
          <input type="text" id="username" required class="w-full px-4 py-3 rounded-lg border-2 border-wedding-300 focus:border-gold focus:outline-none transition">
        </div>
        
        <div>
          <label for="password" class="block text-sm font-semibold text-wedding-700 mb-2">Contraseña</label>
          <input type="password" id="password" required class="w-full px-4 py-3 rounded-lg border-2 border-wedding-300 focus:border-gold focus:outline-none transition">
        </div>
        
        <button type="submit" class="w-full bg-gold text-black py-3 rounded-lg font-semibold hover:bg-silver transition duration-300">Iniciar Sesión</button>
      </form>
      
      <div class="mt-6 text-center">
        <a href="/" class="text-wedding-600 hover:text-gold transition"> Volver al inicio</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
